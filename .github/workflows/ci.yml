name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20.x", "22.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: MCP smoke test (initialize + tools/list)
        env:
          REPULL_API_KEY: sk_test_ci_smoketest
        run: |
          OUT=$(printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | timeout 10 node dist/index.js 2>/dev/null || true)
          echo "$OUT"
          echo "$OUT" | grep -q "repull_health_check" && echo "OK: tool registered"
          echo "$OUT" | grep -q "repull_create_connect_session" && echo "OK: connect tool registered"
